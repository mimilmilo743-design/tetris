<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TETRIS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

  :root{
    --bg:#0a0e14;
    --panel:#11161f;
    --grid-line:#1c2433;
    --accent:#00f0c0;
    --accent-dim:#0a5c4c;
    --text:#d7e3f4;
    --text-dim:#5b6b85;
    --danger:#ff3860;

    --c-I:#00e5ff;
    --c-O:#ffd400;
    --c-T:#c355ff;
    --c-S:#33ff88;
    --c-Z:#ff3860;
    --c-J:#3b7dff;
    --c-L:#ff9633;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background: radial-gradient(ellipse at 50% -10%, #142033 0%, var(--bg) 60%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'VT323', monospace;
    color:var(--text);
    padding:20px;
  }

  .title{
    font-family:'Press Start 2P', monospace;
    font-size:28px;
    letter-spacing:4px;
    color:var(--accent);
    text-shadow: 0 0 8px var(--accent-dim), 0 0 20px rgba(0,240,192,0.25);
    text-align:center;
    margin-bottom:14px;
  }

  .wrap{
    display:flex;
    gap:22px;
    align-items:flex-start;
  }

  .board-frame{
    position:relative;
    background: linear-gradient(180deg, #161d29, #0d121c);
    border:2px solid #263349;
    border-radius:10px;
    padding:10px;
    box-shadow: 0 0 0 1px #05070b inset, 0 20px 50px -20px rgba(0,0,0,0.8);
  }

  canvas#board{
    display:block;
    background: var(--bg);
    border-radius:4px;
    image-rendering: pixelated;
  }

  .overlay{
    position:absolute;
    inset:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:14px;
    background:rgba(5,8,14,0.88);
    border-radius:4px;
    text-align:center;
    padding:20px;
  }
  .overlay.hidden{ display:none; }
  .overlay h2{
    font-family:'Press Start 2P', monospace;
    font-size:18px;
    color:var(--accent);
    letter-spacing:2px;
  }
  .overlay p{ color:var(--text-dim); font-size:18px; max-width:220px; }
  .btn{
    font-family:'Press Start 2P', monospace;
    font-size:12px;
    background:var(--accent);
    color:#04120e;
    border:none;
    padding:12px 18px;
    border-radius:4px;
    cursor:pointer;
    letter-spacing:1px;
    box-shadow: 0 4px 0 var(--accent-dim);
    transition: transform .05s ease;
  }
  .btn:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--accent-dim); }

  .side{
    display:flex;
    flex-direction:column;
    gap:14px;
    width:170px;
  }

  .panel{
    background: linear-gradient(180deg, #161d29, #0d121c);
    border:2px solid #263349;
    border-radius:10px;
    padding:12px 14px;
  }

  .panel h3{
    font-family:'Press Start 2P', monospace;
    font-size:10px;
    color:var(--text-dim);
    letter-spacing:2px;
    margin-bottom:8px;
  }

  .panel .value{
    font-family:'Press Start 2P', monospace;
    font-size:20px;
    color:var(--accent);
    text-shadow:0 0 6px var(--accent-dim);
  }

  canvas#next{
    display:block;
    margin:0 auto;
    background:var(--bg);
    border-radius:4px;
  }

  .keys{
    font-size:16px;
    line-height:1.6;
    color:var(--text-dim);
  }
  .keys b{ color:var(--text); }

  .credit{
    text-align:center;
    font-size:14px;
    color:var(--text-dim);
    margin-top:14px;
    letter-spacing:1px;
  }
</style>
</head>
<body>

<div>
  <div class="title">T E T R I S</div>
  <div class="wrap">

    <div class="board-frame">
      <canvas id="board" width="240" height="480"></canvas>
      <div class="overlay" id="overlay">
        <h2>TETRIS</h2>
        <p>Usa las flechas para moverte y girar. Espacio para caida rapida.</p>
        <button class="btn" id="startBtn">JUGAR</button>
      </div>
    </div>

    <div class="side">
      <div class="panel">
        <h3>SIGUIENTE</h3>
        <canvas id="next" width="96" height="96"></canvas>
      </div>

      <div class="panel">
        <h3>PUNTAJE</h3>
        <div class="value" id="score">0</div>
      </div>

      <div class="panel">
        <h3>NIVEL</h3>
        <div class="value" id="level">1</div>
      </div>

      <div class="panel">
        <h3>LINEAS</h3>
        <div class="value" id="lines">0</div>
      </div>

      <div class="panel keys">
        <div><b>&larr; &rarr;</b> mover</div>
        <div><b>&uarr;</b> girar</div>
        <div><b>&darr;</b> bajar</div>
        <div><b>ESPACIO</b> caida</div>
        <div><b>P</b> pausa</div>
      </div>
    </div>

  </div>
  <div class="credit">Clasico Tetris &mdash; hecho para ti</div>
</div>

<script>
(function(){
  const COLS = 10, ROWS = 20, CELL = 24;
  const boardCanvas = document.getElementById('board');
  const ctx = boardCanvas.getContext('2d');
  const nextCanvas = document.getElementById('next');
  const nctx = nextCanvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const scoreEl = document.getElementById('score');
  const levelEl = document.getElementById('level');
  const linesEl = document.getElementById('lines');

  const COLORS = {
    I: getVar('--c-I'), O: getVar('--c-O'), T: getVar('--c-T'),
    S: getVar('--c-S'), Z: getVar('--c-Z'), J: getVar('--c-J'), L: getVar('--c-L')
  };
  function getVar(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  const SHAPES = {
    I: [[0,1],[1,1],[2,1],[3,1]],
    O: [[1,0],[2,0],[1,1],[2,1]],
    T: [[1,0],[0,1],[1,1],[2,1]],
    S: [[1,0],[2,0],[0,1],[1,1]],
    Z: [[0,0],[1,0],[1,1],[2,1]],
    J: [[0,0],[0,1],[1,1],[2,1]],
    L: [[2,0],[0,1],[1,1],[2,1]]
  };
  const KEYS = Object.keys(SHAPES);

  let grid, current, next, score, level, lines, dropCounter, dropInterval, lastTime, running, paused, gameOver;
  let animId;

  function newGrid(){
    return Array.from({length: ROWS}, () => Array(COLS).fill(null));
  }

  function randomPiece(){
    const type = KEYS[Math.floor(Math.random()*KEYS.length)];
    const cells = SHAPES[type].map(c => ({x: c[0], y: c[1]}));
    return { type, cells, x: 3, y: -1, rot: 0 };
  }

  function rotateCells(cells, type){
    if(type === 'O') return cells.map(c => ({...c}));
    // rotate around a pivot approx center (using bounding box center of 3 or 4)
    const size = type === 'I' ? 4 : 3;
    return cells.map(c => {
      const x = c.x, y = c.y;
      // rotate 90deg clockwise about center of size grid
      const nx = size - 1 - y;
      const ny = x;
      return {x: nx, y: ny};
    });
  }

  function collides(cells, ox, oy){
    for(const c of cells){
      const x = c.x + ox, y = c.y + oy;
      if(x < 0 || x >= COLS || y >= ROWS) return true;
      if(y >= 0 && grid[y][x]) return true;
    }
    return false;
  }

  function merge(){
    for(const c of current.cells){
      const x = c.x + current.x, y = c.y + current.y;
      if(y >= 0) grid[y][x] = current.type;
    }
  }

  function clearLines(){
    let cleared = 0;
    outer:
    for(let y = ROWS - 1; y >= 0; y--){
      for(let x = 0; x < COLS; x++){
        if(!grid[y][x]) continue outer;
      }
      grid.splice(y, 1);
      grid.unshift(Array(COLS).fill(null));
      cleared++;
      y++;
    }
    if(cleared > 0){
      const points = [0, 100, 300, 500, 800][cleared] * level;
      score += points;
      lines += cleared;
      const newLevel = Math.floor(lines / 10) + 1;
      if(newLevel !== level){
        level = newLevel;
        dropInterval = Math.max(100, 1000 - (level - 1) * 80);
      }
      updateHUD();
    }
  }

  function spawn(){
    current = next;
    next = randomPiece();
    current.x = 3;
    current.y = -1;
    if(collides(current.cells, current.x, current.y)){
      endGame();
    }
    drawNext();
  }

  function move(dx){
    if(!collides(current.cells, current.x + dx, current.y)){
      current.x += dx;
    }
  }

  function softDrop(){
    if(!collides(current.cells, current.x, current.y + 1)){
      current.y += 1;
      score += 1;
      updateHUD();
    } else {
      lockPiece();
    }
  }

  function hardDrop(){
    let dist = 0;
    while(!collides(current.cells, current.x, current.y + 1)){
      current.y += 1;
      dist++;
    }
    score += dist * 2;
    updateHUD();
    lockPiece();
  }

  function lockPiece(){
    merge();
    clearLines();
    spawn();
    dropCounter = 0;
  }

  function rotate(){
    const rotated = rotateCells(current.cells, current.type);
    const kicks = [0, -1, 1, -2, 2];
    for(const k of kicks){
      if(!collides(rotated, current.x + k, current.y)){
        current.cells = rotated;
        current.x += k;
        return;
      }
    }
  }

  function updateHUD(){
    scoreEl.textContent = score;
    levelEl.textContent = level;
    linesEl.textContent = lines;
  }

  function drawCell(c, px, py, size, color){
    c.fillStyle = color;
    c.fillRect(px, py, size, size);
    c.fillStyle = 'rgba(255,255,255,0.25)';
    c.fillRect(px, py, size, 3);
    c.fillRect(px, py, 3, size);
    c.fillStyle = 'rgba(0,0,0,0.3)';
    c.fillRect(px, py + size - 3, size, 3);
    c.fillRect(px + size - 3, py, 3, size);
  }

  function draw(){
    ctx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);

    // grid lines
    ctx.strokeStyle = getVar('--grid-line');
    ctx.lineWidth = 1;
    for(let x = 0; x <= COLS; x++){
      ctx.beginPath();
      ctx.moveTo(x * CELL, 0);
      ctx.lineTo(x * CELL, ROWS * CELL);
      ctx.stroke();
    }
    for(let y = 0; y <= ROWS; y++){
      ctx.beginPath();
      ctx.moveTo(0, y * CELL);
      ctx.lineTo(COLS * CELL, y * CELL);
      ctx.stroke();
    }

    // placed blocks
    for(let y = 0; y < ROWS; y++){
      for(let x = 0; x < COLS; x++){
        if(grid[y][x]){
          drawCell(ctx, x * CELL, y * CELL, CELL, COLORS[grid[y][x]]);
        }
      }
    }

    // ghost piece
    let ghostY = current.y;
    while(!collides(current.cells, current.x, ghostY + 1)) ghostY++;
    ctx.globalAlpha = 0.2;
    for(const c of current.cells){
      const x = c.x + current.x, y = c.y + ghostY;
      if(y >= 0) drawCell(ctx, x * CELL, y * CELL, CELL, COLORS[current.type]);
    }
    ctx.globalAlpha = 1;

    // current piece
    for(const c of current.cells){
      const x = c.x + current.x, y = c.y + current.y;
      if(y >= 0) drawCell(ctx, x * CELL, y * CELL, CELL, COLORS[current.type]);
    }
  }

  function drawNext(){
    nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
    const size = 20;
    const cells = next.cells;
    const maxX = Math.max(...cells.map(c => c.x));
    const maxY = Math.max(...cells.map(c => c.y));
    const offX = (nextCanvas.width - (maxX + 1) * size) / 2;
    const offY = (nextCanvas.height - (maxY + 1) * size) / 2;
    for(const c of cells){
      drawCell(nctx, offX + c.x * size, offY + c.y * size, size, COLORS[next.type]);
    }
  }

  function update(time = 0){
    if(!running || paused){ return; }
    const delta = time - lastTime;
    lastTime = time;
    dropCounter += delta;
    if(dropCounter > dropInterval){
      if(!collides(current.cells, current.x, current.y + 1)){
        current.y += 1;
      } else {
        lockPiece();
      }
      dropCounter = 0;
    }
    draw();
    animId = requestAnimationFrame(update);
  }

  function startGame(){
    grid = newGrid();
    score = 0; level = 1; lines = 0;
    dropInterval = 1000;
    dropCounter = 0; lastTime = 0;
    next = randomPiece();
    spawn();
    updateHUD();
    running = true; paused = false; gameOver = false;
    overlay.classList.add('hidden');
    cancelAnimationFrame(animId);
    animId = requestAnimationFrame(update);
  }

  function endGame(){
    running = false; gameOver = true;
    cancelAnimationFrame(animId);
    overlay.querySelector('h2').textContent = 'GAME OVER';
    overlay.querySelector('p').textContent = 'Puntaje final: ' + score;
    startBtn.textContent = 'JUGAR DE NUEVO';
    overlay.classList.remove('hidden');
  }

  function togglePause(){
    if(!running) return;
    paused = !paused;
    if(paused){
      overlay.querySelector('h2').textContent = 'PAUSA';
      overlay.querySelector('p').textContent = 'Presiona P para continuar';
      startBtn.textContent = 'CONTINUAR';
      overlay.classList.remove('hidden');
    } else {
      overlay.classList.add('hidden');
      lastTime = performance.now();
      animId = requestAnimationFrame(update);
    }
  }

  startBtn.addEventListener('click', () => {
    if(paused){ togglePause(); return; }
    startGame();
    startBtn.textContent = 'JUGAR';
  });

  document.addEventListener('keydown', (e) => {
    if(gameOver) return;
    if(e.code === 'KeyP'){ togglePause(); return; }
    if(!running || paused) return;
    switch(e.code){
      case 'ArrowLeft': move(-1); draw(); break;
      case 'ArrowRight': move(1); draw(); break;
      case 'ArrowDown': softDrop(); draw(); break;
      case 'ArrowUp': rotate(); draw(); break;
      case 'Space': e.preventDefault(); hardDrop(); draw(); break;
    }
  });

  // initial idle draw
  grid = newGrid();
  current = randomPiece();
  next = randomPiece();
  draw();
  drawNext();
})();
</script>
</body>
</html>
